extensions:
  - name: ami-backup
    binary: projects/AMI-DATAOPS/ami/dataops/backup/create/main.py
    description: Backup (rsync snapshots / Google Drive)
    category: dev
    features:
      - --mode
      - --target
      - --keep-local
      - --dry-run
    bannerPriority: 200
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "backup"
      timeout: 5

  - name: ami-restore
    binary: projects/AMI-DATAOPS/ami/dataops/backup/restore/main.py
    description: Restore from snapshots or archives
    category: dev
    features:
      - --latest-snapshot
      - --snapshot
      - --file-id
      - --latest-local
    bannerPriority: 210
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "restore"
      timeout: 5

  - name: ami-serve
    binary: projects/AMI-DATAOPS/ami/dataops/serve/main.py
    description: Publish apps on Cloudflare Tunnel FQDNs
    category: infra
    features:
      - deploy
      - stop
      - restart
      - status
      - route-dns
      - logs
    bannerPriority: 220
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "ami-serve"
      timeout: 5
