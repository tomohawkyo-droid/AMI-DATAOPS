extensions:
  - name: ami-backup
    binary: projects/AMI-DATAOPS/ami/dataops/backup/create/main.py
    description: Backup (rsync snapshots / Google Drive)
    category: dev
    features:
      - --mode
      - --target
      - --keep-local
      - --dry-run
    bannerPriority: 200
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "backup"
      timeout: 5

  - name: ami-restore
    binary: projects/AMI-DATAOPS/ami/dataops/backup/restore/main.py
    description: Restore from snapshots or archives
    category: dev
    features:
      - --latest-snapshot
      - --snapshot
      - --file-id
      - --latest-local
    bannerPriority: 210
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "restore"
      timeout: 5

  - name: ami-serve
    binary: projects/AMI-DATAOPS/ami/dataops/serve/main.py
    description: Publish apps on Cloudflare Tunnel FQDNs
    category: infra
    features:
      - deploy
      - stop
      - restart
      - status
      - route-dns
      - logs
    bannerPriority: 220
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "ami-serve"
      timeout: 5

  - name: ami-intake
    binary: projects/AMI-DATAOPS/ami/dataops/intake/main.py
    description: Receive, validate, and quarantine remote log bundles
    category: infra
    features:
      - serve
      - status
      - ls
      - show
      - verify
      - rotate-audit
    bannerPriority: 260
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "ami-intake"
      timeout: 5

  - name: ami-report
    binary: projects/AMI-DATAOPS/ami/dataops/report/main.py
    description: Multi-select + ship log files to a peer AMI instance
    category: dev
    features:
      - send
      - preview
      - peers
    bannerPriority: 250
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "ami-report"
      timeout: 5
